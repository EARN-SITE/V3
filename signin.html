<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EARN — Sign in</title>
<meta name="robots" content="noindex">
<!-- ════════════════════════════════════════════════════════════════
     MOCKUP 1 / SIGN-IN PAGE — design target for Ian (June 12, 2026)
     Spec: User Flow Map — App Delta Spec, §9 (Flow F router) + §13.
     BUILD NOTES:
     • One sign-in page for ALL account types. After auth, the router
       reads account type and lands: member → portal · sender → sending
       dashboard · applicant → status screen · admin → admin panel.
       The user never chooses.
     • ESCAPE HATCH (required): the two links under the divider so a
       visitor without an account never dead-ends. "Submit a referral"
       → the standalone submission form (Flow A). "Get verified" →
       sender registration (Flow B).
     • Vocabulary: button is "Sign in" (never "Member Portal" /
       "Login"). Microcopy may say "referring agents" lowercase only.
     • Gold = #918268 (app branding swap, checklist item 2).
     • This static glow ring stands in for any animated treatment —
       match whatever the app framework does cheaply; the layout and
       copy are the locked parts, the shimmer is not.
     ════════════════════════════════════════════════════════════════ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{--font-sans:'Inter',system-ui,sans-serif;--font-serif:'Cormorant Garamond',Georgia,serif;--gold:#918268;--gold-light:#a89a7e;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(900px 500px at 50% -5%,rgba(145,130,104,0.12),transparent 60%),#0a0a0a;color:#e4e4e7;padding:32px 16px;}
  a{text-decoration:none;color:inherit;}
:focus-visible{outline:2px solid rgba(145,130,104,0.75);outline-offset:2px;border-radius:6px;}

  .brand{font-weight:800;letter-spacing:0.08em;font-size:18px;color:#fff;margin-bottom:36px;}

  .card{width:100%;max-width:400px;background:rgba(16,16,16,0.72);border:1px solid rgba(255,255,255,0.07);
    border-radius:20px;padding:40px 36px 34px;backdrop-filter:blur(18px);box-shadow:0 8px 40px rgba(0,0,0,0.45);}

  .fp{display:block;width:30px;height:30px;margin:0 auto 18px;}
  .fp path{fill:var(--gold);opacity:0.85;}

  h1{font-family:var(--font-serif);font-weight:300;font-size:30px;color:#fff;text-align:center;letter-spacing:0.01em;margin-bottom:8px;}
  .sub{font-size:13px;color:#8f8f96;text-align:center;margin-bottom:30px;line-height:1.6;}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#71717a;margin-bottom:7px;}
  .field input{width:100%;padding:13px 15px;font-size:14px;color:#e4e4e7;background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.10);border-radius:10px;outline:none;transition:border-color .25s,box-shadow .25s;font-family:var(--font-sans);}
  .field input::placeholder{color:#52525b;}
  .field input:focus{border-color:rgba(145,130,104,0.55);box-shadow:0 0 0 3px rgba(145,130,104,0.12);}

  .signin-btn{width:100%;margin-top:8px;padding:14px;border:none;border-radius:9999px;cursor:pointer;
    font-family:var(--font-sans);font-size:14px;font-weight:500;letter-spacing:0.04em;color:#fff;background:rgba(8,8,8,0.95);
    box-shadow:0 0 0 1px rgba(145,130,104,0.5),0 4px 24px rgba(145,130,104,0.22);transition:box-shadow .3s,background .3s;}
  .signin-btn:hover{background:rgba(20,20,20,0.95);box-shadow:0 0 0 1px rgba(145,130,104,0.8),0 6px 30px rgba(145,130,104,0.35);}

  .forgot{display:block;text-align:center;margin-top:16px;font-size:12.5px;color:#71717a;transition:color .2s;}
  .forgot:hover{color:#a1a1aa;}

  .divider{display:flex;align-items:center;gap:14px;margin:28px 0 18px;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,0.08);}
  .divider span{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#5d5d63;}

  .hatch{display:flex;flex-direction:column;align-items:center;gap:11px;}
  .hatch a{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:#8f8f96;transition:color .25s;}
  .hatch a:hover{color:var(--gold-light);}
  .hatch .a{transition:transform .25s;}
  .hatch a:hover .a{transform:translateX(3px);}

  .foot{margin-top:26px;font-size:11.5px;color:#52525b;text-align:center;line-height:1.7;max-width:340px;}
</style>
</head>
<body>

<a href="/" class="brand">EARN</a>

  <h1>Sign in</h1>
  <p class="sub">Enter your credentials — you'll land exactly where you belong.</p>

  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@brokerage.com" autocomplete="email">
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password">
  </div>

  <button class="signin-btn">Sign in</button>
  <a href="#" class="forgot">Forgot password?</a>

  <div class="divider"><span>New to EARN?</span></div>

  <div class="hatch">
    <a href="/refer">Submit a referral <span class="a">→</span></a>
    <a href="/get-verified">Get verified to refer <span class="a">→</span></a>
  </div>
</div>

<p class="foot">Members, referring agents, and applicants all sign in here — your account knows the way.</p>
