<link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

<style>
:root {
  --background: #050505;
  --foreground: #fafafa;
  --gold: #918268;
  --gold-light: #a89478;
  --text-primary: #ffffff;
  --text-secondary: #d4d4d8;
  --text-body: #82828a;
  --text-muted: #78787f;
  --text-warm: #847b66;
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-serif: 'Cormorant Garamond', Georgia, serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: var(--font-sans);
  background: var(--background);
  color: var(--foreground);
  overflow-x: hidden;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
a { color: inherit; text-decoration: none; }

/* ═══ NAVBAR ═══ */
.nav-outer {
  position: fixed; top: 0; left: 0; right: 0; z-index: 55;
  display: flex; justify-content: center; padding: 16px 16px 0;
}
.nav-pill {
  display: flex; width: 100%; max-width: 1200px;
  align-items: center; justify-content: space-between;
  border-radius: 9999px; padding: 12px 28px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(12,12,12,0.5);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
}
.nav-left { display: flex; align-items: center; }
.nav-center {
  display: flex; align-items: center; gap: 36px;
  position: absolute; left: 50%; transform: translateX(-50%);
}
.nav-link { font-size: 13px; font-weight: 500; color: #a1a1aa; letter-spacing: 0.02em; transition: color 0.2s; }
.nav-link:hover { color: white; }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-signin { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: #a1a1aa; transition: color 0.2s; }
.nav-signin:hover { color: white; }

/* Shader button */
.shader-btn-wrap { position: relative; display: inline-flex; border-radius: 9999px; cursor: pointer; }
.shader-btn-wrap canvas {
  position: absolute; top: -4px; left: -4px;
  width: calc(100% + 8px); height: calc(100% + 8px);
  border-radius: 9999px; pointer-events: none; z-index: 0;
}
.shader-btn {
  white-space: nowrap;
  position: relative; z-index: 1;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 9999px; border: none;
  background: rgba(8,8,8,0.92); color: white;
  font-family: var(--font-sans); font-weight: 500; letter-spacing: 0.04em;
  cursor: pointer; transition: background 0.3s;
}
.shader-btn:hover { background: rgba(18,18,18,0.95); }
.shader-btn.sm { padding: 10px 24px; font-size: 13px; }

/* Hamburger */
.nav-hamburger {
  display: none; flex-direction: column; justify-content: center; align-items: center;
  width: 40px; height: 40px; cursor: pointer; background: none; border: none; padding: 0;
}
.nav-hamburger span {
  display: block; width: 20px; height: 1.5px; background: #d4d4d8;
  transition: all 0.35s cubic-bezier(0.4,0,0.2,1); border-radius: 1px;
}
.nav-hamburger span:nth-child(1) { transform: translateY(-4px); }
.nav-hamburger span:nth-child(3) { transform: translateY(4px); }

@media (max-width: 960px) {
  .nav-center { display: none; }
  .nav-hamburger { display: flex; }
}
@media (max-width: 768px) {
  .nav-pill { padding: 10px 16px; }
}
@media (max-width: 480px) {
  .nav-signin span { display: inline; }
}

/* ═══ 404 CONTENT ═══ */
.error-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 160px 24px 120px;
  min-height: 100vh;
}
.error-code {
  font-family: var(--font-serif);
  font-size: clamp(4rem, 12vw, 8rem);
  font-weight: 300;
  letter-spacing: -0.04em;
  color: rgba(145,130,104,0.15);
  line-height: 1;
  margin-bottom: 24px;
  user-select: none;
}
.error-title {
  font-family: var(--font-serif);
  font-size: clamp(1.25rem, 3vw, 1.75rem);
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--text-secondary);
  margin-bottom: 16px;
}
.error-body {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-body);
  max-width: 360px;
  margin-bottom: 48px;
}
.error-link {
  font-size: 13px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 0.02em;
  transition: color 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.error-link:hover { color: var(--gold-light); }
.error-link svg {
  width: 14px; height: 14px;
  stroke: currentColor;
  transition: transform 0.3s;
}
.error-link:hover svg { transform: translateX(3px); }

/* ═══ FOOTER ═══ */
.footer-minimal {
  max-width: 680px; margin: 0 auto; width: 100%;
  padding: 0 24px 64px;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid rgba(255,255,255,0.06); padding-top: 32px;
}
.footer-minimal p,
.footer-minimal a { font-size: 12px; color: var(--text-muted); transition: color 0.2s; }
.footer-minimal a:hover { color: var(--text-body); }
</style>
